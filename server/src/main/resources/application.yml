spring:
  application:
    name: maxpos-server

  # Auto-load server/.env (optional — falls back to process env if absent).
  # See server/.env.example for required keys.
  config:
    import: optional:file:.env[.properties]

  # ────────────────────────────────────────────────────────────────
  # Cold-start tuning.
  #   - lazy-initialization: beans are instantiated on first use
  #     rather than at container boot. Cuts Render's cold start from
  #     ~30s to ~10s; the cost is the first request paying ~2–4s as
  #     dependent beans wake up. The login-screen warm ping makes
  #     that invisible to the cashier.
  #   - jmx.enabled=false: skip the management bean registration
  #     pass we don't use.
  # ────────────────────────────────────────────────────────────────
  main:
    lazy-initialization: true
  jmx:
    enabled: false

  # ────────────────────────────────────────────────────────────────
  # PostgreSQL — fill in these values or set them as env vars:
  #   DB_URL        jdbc:postgresql://localhost:5432/maxpos
  #   DB_USERNAME   maxpos
  #   DB_PASSWORD   change-me
  # ────────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/maxpos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    # HikariCP — minimal pool sized for a single-store POS. Smaller
    # pool = faster pool initialization on cold start. minimum-idle
    # at 1 keeps one warm connection so the first request after
    # boot doesn't pay a TCP/TLS handshake.
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 30000
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Render's managed Postgres can be slow to accept the first
    # connection after the app cold-starts in tandem with the DB.
    # Retry the migration connect for ~30s instead of failing fast.
    connect-retries: 6
    connect-retries-interval: 5

server:
  # Render injects PORT; local dev uses SERVER_PORT (see server/.env.example).
  # Falls back to 8080 when neither is set.
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always
  # Product images travel as base64 data URLs in JSON bodies; allow enough
  # headroom for a resized ~100KB JPEG plus the rest of the product fields.
  tomcat:
    max-http-form-post-size: 4MB
    max-swallow-size: 4MB

# ────────────────────────────────────────────────────────────────
# App-level config — override in an application-local.yml that
# you DO NOT commit, or via env vars.
# ────────────────────────────────────────────────────────────────
maxpos:
  push:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@maxpos.com}
  fx:
    # Live exchange rates for the platform revenue total. {base} is the
    # platform currency; {key} is FX_API_KEY (only providers that need one).
    enabled: ${FX_ENABLED:true}
    url: ${FX_API_URL:https://open.er-api.com/v6/latest/{base}}
    api-key: ${FX_API_KEY:}
    ttl-minutes: ${FX_TTL_MINUTES:60}
  jwt:
    # Must be at least 256 bits (32 chars) of random entropy. Generate with:
    #   openssl rand -base64 48
    secret: ${JWT_SECRET:change-me-please-this-is-only-for-local-dev-do-not-ship}
    issuer: maxpos
    # Access token lifetime in minutes
    ttl-minutes: ${JWT_TTL_MINUTES:480}
  cors:
    # Patterns, not literal URLs. "http://localhost:*" matches any dev port
    # (4200, 4201, …) so running a second Angular app doesn't break CORS.
    # In production, replace with specific frontend origins.
    allowed-origins:
      - http://localhost:*

logging:
  level:
    root: INFO
    com.maxpos: DEBUG
    org.hibernate.SQL: INFO
