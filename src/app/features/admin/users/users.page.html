<section class="page">
  <header class="page__header">
    <div>
      <h1 class="page__title">Users</h1>
      <p class="page__subtitle">Admins and cashiers who can access MaxPOS</p>
    </div>
    <button mat-flat-button color="primary">
      <mat-icon>person_add</mat-icon>
      Invite user
    </button>
  </header>

  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="filters">
        <mat-form-field appearance="outline" class="filters__search">
          <mat-label>Search</mat-label>
          <input
            matInput
            placeholder="Name or email"
            [ngModel]="search()"
            (ngModelChange)="search.set($event)"
          />
          <mat-icon matPrefix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="filters__field">
          <mat-label>Role</mat-label>
          <mat-select [ngModel]="roleFilter()" (ngModelChange)="roleFilter.set($event)">
            <mat-option value="all">All roles</mat-option>
            <mat-option value="admin">Administrators</mat-option>
            <mat-option value="cashier">Cashiers</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="table-wrap">
        <table mat-table [dataSource]="rows()" class="w-full">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let u">
              <div class="user-cell">
                <div class="user-cell__avatar">{{ initials(u.name) }}</div>
                <strong>{{ u.name }}</strong>
              </div>
            </td>
          </ng-container>
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let u">{{ u.email }}</td>
          </ng-container>
          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef>Role</th>
            <td mat-cell *matCellDef="let u">
              <mat-chip [class]="'status-chip ' + (u.role === 'admin' ? 'status-chip--admin' : 'status-chip--cashier')" disableRipple>
                {{ u.role | titlecase }}
              </mat-chip>
            </td>
          </ng-container>
          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef>Joined</th>
            <td mat-cell *matCellDef="let u">{{ u.createdAt | date: 'mediumDate' }}</td>
          </ng-container>
          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef>Active</th>
            <td mat-cell *matCellDef="let u">
              <mat-slide-toggle [checked]="u.active" disabled></mat-slide-toggle>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let u">
              <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Row actions">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button mat-menu-item><mat-icon>edit</mat-icon><span>Edit</span></button>
                <button mat-menu-item><mat-icon>lock_reset</mat-icon><span>Reset password</span></button>
                <button mat-menu-item><mat-icon>block</mat-icon><span>Deactivate</span></button>
              </mat-menu>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="columns"></tr>
          <tr mat-row *matRowDef="let row; columns: columns"></tr>
          <tr *matNoDataRow>
            <td [attr.colspan]="columns.length" class="no-data">No users match your filters.</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</section>
