<div class="cashier-shell">
  <mat-toolbar class="cashier-shell__toolbar">
    <img src="/icons/icon-192.png" alt="" class="cashier-shell__brand-logo" aria-hidden="true" />
    <span class="cashier-shell__title">MaxPOS Register</span>

    <nav class="cashier-shell__nav">
      <a
        mat-button
        routerLink="pos"
        routerLinkActive="cashier-shell__nav-link--active"
      >
        <mat-icon>shopping_cart</mat-icon>
        Sell
        @if (cartItemCount() > 0) {
          <span
            class="cashier-shell__badge"
            [matBadge]="cartItemCount()"
            matBadgeOverlap="false"
            matBadgeColor="accent"
          ></span>
        }
      </a>
      <a
        mat-button
        routerLink="transactions"
        routerLinkActive="cashier-shell__nav-link--active"
      >
        <mat-icon>history</mat-icon>
        My Transactions
      </a>
    </nav>

    <span class="cashier-shell__spacer"></span>

    @if (showSyncBadge()) {
      <button
        type="button"
        class="cashier-shell__sync"
        [class.cashier-shell__sync--offline]="!online()"
        [class.cashier-shell__sync--syncing]="syncing()"
        [matTooltip]="
          !online()
            ? 'Offline — sales are queued locally and will sync when you reconnect'
            : pendingSync() + ' pending sale(s). Tap to retry now.'
        "
        (click)="retrySync()"
        [disabled]="syncing()"
      >
        <mat-icon>
          {{ !online() ? 'cloud_off' : syncing() ? 'sync' : 'sync_problem' }}
        </mat-icon>
        <span class="cashier-shell__sync-label">
          @if (!online()) {
            Offline
          } @else if (syncing()) {
            Syncing…
          } @else {
            {{ pendingSync() }} pending
          }
        </span>
      </button>
    }

    <div class="cashier-shell__user">
      @if (currentUser(); as user) {
        <div class="cashier-shell__user-text">
          <strong>{{ user.name }}</strong>
          <small>{{ user.role | titlecase }}</small>
        </div>
      }
      <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Account menu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="goHome()">
          <mat-icon>home</mat-icon>
          <span>Home</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign out</span>
        </button>
      </mat-menu>
    </div>
  </mat-toolbar>

  <main class="cashier-shell__main">
    <router-outlet></router-outlet>
  </main>
</div>
